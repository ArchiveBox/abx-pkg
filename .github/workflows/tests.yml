name: Run Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  precheck:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Setup venv and install pip dependencies
      run: |
        uv venv --python "3.12" \
        && uv sync --all-extras --all-groups --no-cache \
        && uv pip install pip \
        && echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH" \
        && if [ -d /nix/var/nix/profiles/default/bin ]; then echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"; fi

    - name: Run pre-commit checks
      run: uv run prek run --all-files

  build:
    needs: precheck
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        python_version: ['3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, macOS-latest]  # TODO: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python_version }}
   
    - name: Install uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Setup pnpm
      uses: pnpm/action-setup@v5.0.0
      with:
        version: 10

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Install Nix on macOS
      if: runner.os == 'macOS'
      uses: DeterminateSystems/nix-installer-action@v22

    - name: Setup venv and install pip dependencies
      run: |
        export PNPM_HOME="${RUNNER_TEMP}/pnpm"
        uv venv --python "${{ matrix.python_version }}"
        uv sync --all-extras
        uv pip install pip
        mkdir -p "$PNPM_HOME"
        echo "$PNPM_HOME" >> "$GITHUB_PATH"
        echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
        if [ -d /nix/var/nix/profiles/default/bin ]; then echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"; fi

    - name: Run standard test suite
      run: |
        export PNPM_HOME="${RUNNER_TEMP}/pnpm"
        export PATH="$PNPM_HOME:$PATH"
        uv run pytest

  live-integration:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-15-intel]

    steps:
    - uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Setup pnpm
      uses: pnpm/action-setup@v5.0.0
      with:
        version: 10

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v22

    - name: Setup Docker on macOS
      if: runner.os == 'macOS'
      uses: docker/setup-docker-action@v5.0.0
      env:
        LIMA_START_ARGS: --vm-type=vz
      with:
        daemon-config: |
          {
            "debug": true
          }

    - name: Setup venv and install pip dependencies
      run: |
        export PNPM_HOME="${RUNNER_TEMP}/pnpm"
        uv venv --python "3.12"
        uv sync --all-extras
        uv pip install pip
        mkdir -p "$PNPM_HOME"
        echo "$PNPM_HOME" >> "$GITHUB_PATH"
        echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
        echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"

    - name: Inspect Docker on macOS
      if: runner.os == 'macOS'
      run: |
        docker version \
        && docker info

    - name: Run non-root live package lifecycle tests on macOS
      if: runner.os == 'macOS'
      run: |
        export PNPM_HOME="${RUNNER_TEMP}/pnpm"
        export PATH="$PNPM_HOME:$PATH"
        uv run pytest \
          tests/test_brewprovider.py::TestBrewProvider::test_live_update_and_uninstall \
          tests/test_pipprovider.py::TestPipProvider::test_live_update_and_uninstall \
          tests/test_npmprovider.py::TestNpmProvider::test_live_update_and_uninstall \
          tests/test_cargoprovider.py::TestCargoProvider::test_live_update_and_uninstall \
          tests/test_gemprovider.py::TestGemProvider::test_live_update_and_uninstall \
          tests/test_gogetprovider.py::TestGoGetProvider::test_live_update_and_uninstall \
          tests/test_nixprovider.py::TestNixProvider::test_live_update_and_uninstall \
          tests/test_dockerprovider.py::TestDockerProvider::test_live_update_and_uninstall

    - name: Run non-root live package lifecycle tests on Linux
      if: runner.os == 'Linux'
      run: |
        export PNPM_HOME="${RUNNER_TEMP}/pnpm"
        export PATH="$PNPM_HOME:$PATH"
        uv run pytest \
          tests/test_pipprovider.py::TestPipProvider::test_live_update_and_uninstall \
          tests/test_npmprovider.py::TestNpmProvider::test_live_update_and_uninstall \
          tests/test_cargoprovider.py::TestCargoProvider::test_live_update_and_uninstall \
          tests/test_gemprovider.py::TestGemProvider::test_live_update_and_uninstall \
          tests/test_gogetprovider.py::TestGoGetProvider::test_live_update_and_uninstall \
          tests/test_nixprovider.py::TestNixProvider::test_live_update_and_uninstall \
          tests/test_dockerprovider.py::TestDockerProvider::test_live_update_and_uninstall

    - name: Run root-required live package lifecycle tests on Linux
      if: runner.os == 'Linux'
      run: |
        export PNPM_HOME="${RUNNER_TEMP}/pnpm"
        sudo env "PATH=$PNPM_HOME:$PATH:/nix/var/nix/profiles/default/bin:$PATH" "$(command -v uv)" run pytest \
          tests/test_aptprovider.py::TestAptProvider::test_live_update_and_uninstall \
          tests/test_pyinfraprovider.py::TestPyinfraProvider::test_live_update_and_uninstall \
          tests/test_ansibleprovider.py::TestAnsibleProvider::test_live_update_and_uninstall
