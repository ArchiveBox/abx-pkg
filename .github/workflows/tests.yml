name: Run Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  precheck:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Setup venv and install pip dependencies
      run: |
        uv venv --python "3.12" \
        && uv sync --all-extras --all-groups --no-cache \
        && uv pip install pip \
        && echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH" \
        && if [ -d /nix/var/nix/profiles/default/bin ]; then echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"; fi

    - name: Run pre-commit checks
      run: uv run prek run --all-files

  discover-standard-tests:
    needs: precheck
    runs-on: ubuntu-latest
    outputs:
      test-files: ${{ steps.set-matrix.outputs.test-files }}

    steps:
    - uses: actions/checkout@v6

    - name: Discover standard test files
      id: set-matrix
      run: |
        json_array="["
        first=true
        for test_file in $(find tests -maxdepth 1 -name 'test_*.py' -type f | sort); do
          if [ "$first" = true ]; then
            first=false
          else
            json_array+=","
          fi

          test_name=$(basename "$test_file" .py | sed 's/^test_//')
          json_array+="{\"path\":\"$test_file\",\"name\":\"$test_name\"}"
        done
        json_array+="]"

        echo "test-files=$json_array" >> "$GITHUB_OUTPUT"
        echo "$json_array"

  build:
    name: ${{ matrix.os }} py${{ matrix.python_version }} ${{ matrix.test.name }}
    needs: [precheck, discover-standard-tests]
    runs-on: ${{ matrix.os }}
    if: ${{ needs.discover-standard-tests.outputs.test-files != '[]' }}
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        python_version: ['3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, macOS-latest]  # TODO: windows-latest
        test: ${{ fromJson(needs.discover-standard-tests.outputs.test-files) }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python_version }}
   
    - name: Install uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Setup pnpm
      uses: pnpm/action-setup@v5.0.0
      with:
        version: 10

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v22

    - name: Setup venv and install pip dependencies
      run: |
        export PNPM_HOME="${RUNNER_TEMP}/pnpm"
        uv venv --python "${{ matrix.python_version }}"
        uv sync --all-extras
        uv pip install pip
        mkdir -p "$PNPM_HOME"
        echo "$PNPM_HOME" >> "$GITHUB_PATH"
        echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
        if [ -d /nix/var/nix/profiles/default/bin ]; then echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"; fi

    - name: Run standard test file
      run: |
        export PNPM_HOME="${RUNNER_TEMP}/pnpm"
        export PATH="$PNPM_HOME:$PATH"
        uv run pytest -m "not root_required and not docker_required" "${{ matrix.test.path }}"

  discover-live-tests:
    needs: precheck
    runs-on: ubuntu-latest
    outputs:
      live-tests: ${{ steps.set-matrix.outputs.live-tests }}

    steps:
    - uses: actions/checkout@v6

    - name: Discover live integration test files
      id: set-matrix
      run: |
        cat >> "$GITHUB_OUTPUT" <<'EOF'
        live-tests=[
          {"name":"pipprovider-linux","path":"tests/test_pipprovider.py","os":"ubuntu-latest","root_required":false,"needs_docker":false},
          {"name":"npmprovider-linux","path":"tests/test_npmprovider.py","os":"ubuntu-latest","root_required":false,"needs_docker":false},
          {"name":"cargoprovider-linux","path":"tests/test_cargoprovider.py","os":"ubuntu-latest","root_required":false,"needs_docker":false},
          {"name":"gemprovider-linux","path":"tests/test_gemprovider.py","os":"ubuntu-latest","root_required":false,"needs_docker":false},
          {"name":"gogetprovider-linux","path":"tests/test_gogetprovider.py","os":"ubuntu-latest","root_required":false,"needs_docker":false},
          {"name":"nixprovider-linux","path":"tests/test_nixprovider.py","os":"ubuntu-latest","root_required":false,"needs_docker":false},
          {"name":"dockerprovider-linux","path":"tests/test_dockerprovider.py","os":"ubuntu-latest","root_required":false,"needs_docker":true},
          {"name":"brewprovider-macos","path":"tests/test_brewprovider.py","os":"macOS-latest","root_required":false,"needs_docker":false},
          {"name":"pipprovider-macos","path":"tests/test_pipprovider.py","os":"macOS-latest","root_required":false,"needs_docker":false},
          {"name":"npmprovider-macos","path":"tests/test_npmprovider.py","os":"macOS-latest","root_required":false,"needs_docker":false},
          {"name":"cargoprovider-macos","path":"tests/test_cargoprovider.py","os":"macOS-latest","root_required":false,"needs_docker":false},
          {"name":"gemprovider-macos","path":"tests/test_gemprovider.py","os":"macOS-latest","root_required":false,"needs_docker":false},
          {"name":"gogetprovider-macos","path":"tests/test_gogetprovider.py","os":"macOS-latest","root_required":false,"needs_docker":false},
          {"name":"nixprovider-macos","path":"tests/test_nixprovider.py","os":"macOS-latest","root_required":false,"needs_docker":false},
          {"name":"aptprovider-linux-root","path":"tests/test_aptprovider.py","os":"ubuntu-latest","root_required":true,"needs_docker":false},
          {"name":"pyinfraprovider-linux-root","path":"tests/test_pyinfraprovider.py","os":"ubuntu-latest","root_required":true,"needs_docker":false},
          {"name":"ansibleprovider-linux-root","path":"tests/test_ansibleprovider.py","os":"ubuntu-latest","root_required":true,"needs_docker":false}
        ]
        EOF

  live-integration:
    name: ${{ matrix.live.name }}
    needs: [precheck, discover-live-tests]
    runs-on: ${{ matrix.live.os }}
    if: ${{ needs.discover-live-tests.outputs.live-tests != '[]' }}
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        live: ${{ fromJson(needs.discover-live-tests.outputs.live-tests) }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Setup pnpm
      uses: pnpm/action-setup@v5.0.0
      with:
        version: 10

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v22

    - name: Setup Docker
      if: ${{ matrix.live.needs_docker }}
      uses: docker/setup-docker-action@v5.0.0
      env:
        LIMA_START_ARGS: --vm-type=vz
      with:
        daemon-config: |
          {
            "debug": true
          }

    - name: Setup venv and install pip dependencies
      run: |
        export PNPM_HOME="${RUNNER_TEMP}/pnpm"
        uv venv --python "3.12"
        uv sync --all-extras
        uv pip install pip
        mkdir -p "$PNPM_HOME"
        echo "$PNPM_HOME" >> "$GITHUB_PATH"
        echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
        echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"

    - name: Inspect Docker
      if: ${{ matrix.live.needs_docker }}
      run: |
        docker version \
        && docker info

    - name: Run non-root live package lifecycle test
      if: ${{ !matrix.live.root_required }}
      run: |
        export PNPM_HOME="${RUNNER_TEMP}/pnpm"
        export PATH="$PNPM_HOME:$PATH"
        uv run pytest "${{ matrix.live.path }}" -k test_provider_direct_methods_exercise_real_lifecycle

    - name: Run root-required live package lifecycle test on Linux
      if: ${{ matrix.live.root_required }}
      run: |
        export PNPM_HOME="${RUNNER_TEMP}/pnpm"
        sudo env "PATH=$PNPM_HOME:$PATH:/nix/var/nix/profiles/default/bin:$PATH" "$(command -v uv)" run pytest \
          "${{ matrix.live.path }}" -k test_provider_direct_methods_exercise_real_lifecycle
